<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Darts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px; }
        canvas { border: 3px solid #e74c3c; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #e74c3c; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🎯 DARTS</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Darts: <strong id="darts">10</strong></span>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="instructions"><span>CLICK</span> to throw! Aim for the bullseye!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let darts = [];
        let score = 0;
        let dartsLeft = 10;
        let gameLoop;
        let throwing = false;
        let dart = { x: 200, y: 450, vx: 0, vy: 0 };
        
        const bullseyeX = 200;
        const bullseyeY = 180;
        
        function init() {
            darts = [];
            score = 0;
            dartsLeft = 10;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('darts').textContent = '10';
        }
        
        function drawTarget() {
            // Board
            const colors = [
                { color: '#1a5f1a', r: 120 },
                { color: '#2d862d', r: 110 },
                { color: '#1a5f1a', r: 100 },
                { color: '#2d862d', r: 90 },
                { color: '#c0392b', r: 80 },
                { color: '#1a5f1a', r: 70 },
                { color: '#2d862d', r: 60 },
                { color: '#f1c40f', r: 50 },
                { color: '#c0392b', r: 40 },
                { color: '#1a5f1a', r: 30 },
                { color: '#27ae60', r: 20 },
                { color: '#e74c3c', r: 10 }
            ];
            
            colors.forEach(c => {
                ctx.fillStyle = c.color;
                ctx.beginPath();
                ctx.arc(bullseyeX, bullseyeY, c.r, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Wire
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            colors.forEach(c => {
                ctx.beginPath();
                ctx.arc(bullseyeX, bullseyeY, c.r, 0, Math.PI * 2);
                ctx.stroke();
            });
            
            // Double ring
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(bullseyeX, bullseyeY, 110, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(bullseyeX, bullseyeY, 90, 0, Math.PI * 2);
            ctx.stroke();
            
            // Bullseye
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(bullseyeX, bullseyeY, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.arc(bullseyeX, bullseyeY, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawDart(d) {
            ctx.fillStyle = '#888';
            ctx.save();
            ctx.translate(d.x, d.y);
            ctx.rotate(d.angle);
            
            // Shaft
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(-2, -20, 4, 20);
            
            // Point
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.moveTo(0, 5);
            ctx.lineTo(-4, 15);
            ctx.lineTo(4, 15);
            ctx.closePath();
            ctx.fill();
            
            // Flight
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.moveTo(-2, -18);
            ctx.lineTo(-12, -25);
            ctx.lineTo(-2, -22);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(2, -18);
            ctx.lineTo(12, -25);
            ctx.lineTo(2, -22);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Wall
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(50, 30, 300, 300);
            
            drawTarget();
            
            // Throwing dart
            if (throwing) {
                drawDart(dart);
            }
            
            // Landed darts
            darts.forEach(d => drawDart(d));
            
            // Aim line
            if (!throwing && dartsLeft > 0) {
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(200, 450);
                ctx.lineTo(200, 250);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
        
        function update() {
            if (!throwing) return;
            
            dart.x += dart.vx;
            dart.y += dart.vy;
            dart.vy += 0.3;  // gravity
            
            // Hit board
            const distToCenter = Math.sqrt((dart.x - bullseyeX) ** 2 + (dart.y - bullseyeY) ** 2);
            if (dart.y < 330 && distToCenter < 120) {
                // Landed!
                dart.angle = Math.atan2(dart.vy, dart.vx) + Math.PI;
                dart.vx = 0;
                dart.vy = 0;
                darts.push({...dart});
                
                // Score
                let points = 0;
                if (distToCenter < 10) points = 50;
                else if (distToCenter < 20) points = 25;
                else if (distToCenter < 30) points = 50;
                else if (distToCenter < 40) points = 40;
                else if (distToCenter < 50) points = 32;
                else if (distToCenter < 60) points = 24;
                else if (distToCenter < 70) points = 18;
                else if (distToCenter < 80) points = 14;
                else if (distToCenter < 90) points = 12;
                else if (distToCenter < 100) points = 10;
                else if (distToCenter < 110) points = 9;
                else if (distToCenter < 120) points = 8;
                else points = 0;
                
                score += points;
                document.getElementById('score').textContent = score;
                
                throwing = false;
                
                if (dartsLeft <= 0) {
                    setTimeout(endGame, 500);
                }
            }
            
            // Hit floor or off screen
            if (dart.y > 480 || dart.x < 0 || dart.x > 400) {
                throwing = false;
                if (dartsLeft <= 0) {
                    setTimeout(endGame, 500);
                }
            }
        }
        
        function endGame() {
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Game Over!\nFinal Score: ${score}\nDarts: ${dartsLeft}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        canvas.addEventListener('click', () => {
            if (throwing || dartsLeft <= 0) return;
            
            dart = {
                x: 200,
                y: 450,
                vx: (Math.random() - 0.5) * 3,
                vy: -15 - Math.random() * 5,
                angle: 0
            };
            throwing = true;
            dartsLeft--;
            document.getElementById('darts').textContent = dartsLeft;
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    </script>
</body>
</html>
