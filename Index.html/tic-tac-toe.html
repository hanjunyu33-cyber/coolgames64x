<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭕ Tic Tac Toe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .status { font-size: 1.5rem; margin-bottom: 15px; }
        canvas { border: 4px solid #fff; border-radius: 10px; background: rgba(0,0,0,0.3); }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.2); color: white;
            border: 2px solid rgba(255,255,255,0.4); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>⭕ TIC TAC TOE</h1>
    <div class="status" id="status">Your turn (X)</div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let board = ['', '', '', '', '', '', '', '', ''];
        let player = 'X';
        let cpu = 'O';
        let currentPlayer = 'X';
        let gameOver = false;
        let vsCPU = true;
        
        function draw() {
            ctx.clearRect(0, 0, 300, 300);
            
            // Grid
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(100, 0);
            ctx.lineTo(100, 300);
            ctx.moveTo(200, 0);
            ctx.lineTo(200, 300);
            ctx.moveTo(0, 100);
            ctx.lineTo(300, 100);
            ctx.moveTo(0, 200);
            ctx.lineTo(300, 200);
            ctx.stroke();
            
            // X and O
            for (let i = 0; i < 9; i++) {
                const x = (i % 3) * 100 + 50;
                const y = Math.floor(i / 3) * 100 + 50;
                
                if (board[i] === 'X') {
                    ctx.strokeStyle = '#3498db';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(x - 25, y - 25);
                    ctx.lineTo(x + 25, y + 25);
                    ctx.moveTo(x + 25, y - 25);
                    ctx.lineTo(x - 25, y + 25);
                    ctx.stroke();
                } else if (board[i] === 'O') {
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }
        
        function checkWin(b) {
            const wins = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            
            for (let w of wins) {
                if (b[w[0]] && b[w[0]] === b[w[1]] && b[w[1]] === b[w[2]]) {
                    return b[w[0]];
                }
            }
            if (b.every(c => c !== '')) return 'tie';
            return null;
        }
        
        function getEmptySpots(b) {
            return b.map((c, i) => c === '' ? i : -1).filter(i => i >= 0);
        }
        
        function minimax(b, depth, isMax) {
            const winner = checkWin(b);
            if (winner === 'O') return 10 - depth;
            if (winner === 'X') return depth - 10;
            if (winner === 'tie') return 0;
            
            const spots = getEmptySpots(b);
            if (isMax) {
                let best = -100;
                for (let spot of spots) {
                    b[spot] = 'O';
                    best = Math.max(best, minimax(b, depth + 1, false));
                    b[spot] = '';
                }
                return best;
            } else {
                let best = 100;
                for (let spot of spots) {
                    b[spot] = 'X';
                    best = Math.min(best, minimax(b, depth + 1, true));
                    b[spot] = '';
                }
                return best;
            }
        }
        
        function cpuMove() {
            const b = [...board];
            const spots = getEmptySpots(b);
            let best = -100;
            let bestSpot = spots[0];
            
            for (let spot of spots) {
                b[spot] = 'O';
                const score = minimax(b, 0, false);
                b[spot] = '';
                if (score > best) {
                    best = score;
                    bestSpot = spot;
                }
            }
            
            board[bestSpot] = 'O';
        }
        
        function handleClick(e) {
            if (gameOver || currentPlayer !== 'X') return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const col = Math.floor(x / 100);
            const row = Math.floor(y / 100);
            const index = row * 3 + col;
            
            if (board[index] === '') {
                board[index] = 'X';
                
                const winner = checkWin(board);
                if (winner) {
                    gameOver = true;
                    document.getElementById('status').textContent = winner === 'tie' ? "It's a tie!" : `${winner} wins!`;
                } else {
                    currentPlayer = 'O';
                    document.getElementById('status').textContent = "CPU's turn...";
                    draw();
                    
                    setTimeout(() => {
                        cpuMove();
                        const winner = checkWin(board);
                        if (winner) {
                            gameOver = true;
                            document.getElementById('status').textContent = winner === 'tie' ? "It's a tie!" : `${winner} wins!`;
                        } else {
                            currentPlayer = 'X';
                            document.getElementById('status').textContent = "Your turn (X)";
                        }
                        draw();
                    }, 500);
                }
                draw();
            }
        }
        
        canvas.addEventListener('click', handleClick);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick({ clientX: touch.clientX, clientY: touch.clientY });
        });
        
        draw();
    </script>
</body>
</html>
