<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #4ade80;
        }
        .score-board {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4ade80;
        }
        canvas {
            border: 4px solid #4ade80;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
        }
        .instructions {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #aaa;
        }
        .instructions span {
            color: #4ade80;
            font-weight: bold;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ef4444;
        }
        #gameOver h2 {
            color: #ef4444;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        #gameOver p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        #gameOver button {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        #gameOver button:hover {
            background: #22c55e;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🐍 Snake Game</h1>
    <div class="score-board">Score: <span id="score">0</span> | High Score: <span id="highScore">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">
        Use <span>ARROW KEYS</span> to move | Press <span>SPACE</span> to pause | <span>R</span> to restart
    </div>
    
    <div id="gameOver">
        <h2>💀 Game Over!</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again 🔄</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 100;
        let isPaused = false;
        let foodCount = 0;
        
        // Colors
        const snakeColor = '#4ade80';
        const snakeHeadColor = '#22c55e';
        const foodColor = '#ef4444';
        const gridColor = 'rgba(255,255,255,0.05)';
        
        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            foodCount = 0;
            gameSpeed = 100;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            placeFood();
            document.getElementById('gameOver').style.display = 'none';
        }
        
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = gridColor;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // Draw food with pulsing effect
            const pulse = Math.sin(Date.now() / 200) * 3;
            ctx.fillStyle = foodColor;
            ctx.shadowColor = foodColor;
            ctx.shadowBlur = 10 + pulse;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw snake
            snake.forEach((segment, index) => {
                const brightness = 1 - (index / snake.length) * 0.4;
                ctx.fillStyle = index === 0 ? snakeHeadColor : snakeColor;
                ctx.globalAlpha = brightness;
                
                // Rounded rectangles for snake
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                const padding = 2;
                const radius = 5;
                
                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, gridSize - padding * 2, gridSize - padding * 2, radius);
                ctx.fill();
                
                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = 4;
                    const eyeOffset = 5;
                    
                    // Position eyes based on direction
                    let eye1x, eye1y, eye2x, eye2y;
                    if (direction.x === 1) { // right
                        eye1x = x + gridSize - eyeOffset; eye1y = y + eyeOffset;
                        eye2x = x + gridSize - eyeOffset; eye2y = y + gridSize - eyeOffset;
                    } else if (direction.x === -1) { // left
                        eye1x = x + eyeOffset; eye1y = y + eyeOffset;
                        eye2x = x + eyeOffset; eye2y = y + gridSize - eyeOffset;
                    } else if (direction.y === -1) { // up
                        eye1x = x + eyeOffset; eye1y = y + eyeOffset;
                        eye2x = x + gridSize - eyeOffset; eye2y = y + eyeOffset;
                    } else { // down
                        eye1x = x + eyeOffset; eye1y = y + gridSize - eyeOffset;
                        eye2x = x + gridSize - eyeOffset; eye2y = y + gridSize - eyeOffset;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1x, eye1y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2x, eye2y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.globalAlpha = 1;
            });
            
            // Draw pause indicator
            if (isPaused) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸️ PAUSED', canvas.width/2, canvas.height/2);
                ctx.font = '16px Arial';
                ctx.fillText('Press SPACE to continue', canvas.width/2, canvas.height/2 + 30);
            }
        }
        
        function update() {
            direction = nextDirection;
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                foodCount++;
                document.getElementById('score').textContent = score;
                placeFood();
                
                // Speed up every 5 food eaten
                if (foodCount % 5 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }
        
        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            clearInterval(gameLoop);
            init();
            gameLoop = setInterval(gameStep, gameSpeed);
        }
        
        function togglePause() {
            isPaused = !isPaused;
            draw();
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
                return;
            }
            
            if (e.code === 'KeyR') {
                restartGame();
                return;
            }
            
            if (isPaused) return;
            
            switch(e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });
        
        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        });
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < -30 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 30 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < -30 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        });
        
        // Start game
        init();
        draw();
        gameLoop = setInterval(gameStep, gameSpeed);
    </script>
</body>
</html>
