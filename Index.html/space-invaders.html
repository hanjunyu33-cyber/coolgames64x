<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #000033, #000066);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ff00;
            color: #00ff00;
        }
        .score-board {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #00ff00;
        }
        canvas {
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            background: #000033;
        }
        .instructions {
            margin-top: 15px;
            font-size: 1rem;
            color: #888;
            text-align: center;
        }
        .instructions span {
            color: #00ff00;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border: 3px solid #ff0000;
            border-radius: 15px;
            text-align: center;
        }
        #gameOver h2 {
            color: #ff0000;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        #gameOver p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00ff00;
        }
        #gameOver button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        #gameOver button:hover {
            background: #00cc00;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .lives {
            color: #ff0066;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>👾 SPACE INVADERS</h1>
    <div class="score-board">
        Score: <span id="score">0</span> | 
        High Score: <span id="highScore">0</span> | 
        Lives: <span id="lives" class="lives">❤️❤️❤️</span>
    </div>
    <canvas id="gameCanvas" width="600" height="450"></canvas>
    <div class="instructions">
        <span>← →</span> or <span>A D</span> to move | 
        <span>SPACE</span> to shoot | 
        <span>R</span> to restart
    </div>
    
    <div id="gameOver">
        <h2>💀 GAME OVER 💀</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">PLAY AGAIN 🔄</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game settings
        const PLAYER_WIDTH = 50;
        const PLAYER_HEIGHT = 30;
        const BULLET_WIDTH = 4;
        const BULLET_HEIGHT = 15;
        const ALIEN_WIDTH = 35;
        const ALIEN_HEIGHT = 25;
        const ALIEN_ROWS = 5;
        const ALIEN_COLS = 8;
        const ALIEN_PADDING = 15;
        
        let player = { x: 275, y: 400, width: PLAYER_WIDTH, height: PLAYER_HEIGHT };
        let bullets = [];
        let aliens = [];
        let alienDirection = 1;
        let alienSpeed = 1;
        let bulletSpeed = 7;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('spaceInvadersHighScore')) || 0;
        let lives = 3;
        let gameOver = false;
        let gameLoop;
        let lastShot = 0;
        const SHOT_DELAY = 250;
        
        // Alien types and points
        const ALIEN_TYPES = [
            { color: '#ff0066', points: 40, shape: 'diamond' },  // Top row - 40 pts
            { color: '#ffff00', points: 20, shape: 'circle' },   // Middle rows - 20 pts
            { color: '#00ffff', points: 10, shape: 'square' }    // Bottom rows - 10 pts
        ];
        
        function init() {
            player.x = canvas.width / 2 - PLAYER_WIDTH / 2;
            bullets = [];
            aliens = [];
            alienDirection = 1;
            alienSpeed = 1;
            score = 0;
            lives = 3;
            gameOver = false;
            
            // Create aliens
            const startX = (canvas.width - (ALIEN_COLS * (ALIEN_WIDTH + ALIEN_PADDING))) / 2;
            const startY = 50;
            
            for (let row = 0; row < ALIEN_ROWS; row++) {
                for (let col = 0; col < ALIEN_COLS; col++) {
                    let typeIndex = 0;
                    if (row === 0) typeIndex = 0;      // Top row - diamond, 40 pts
                    else if (row <= 2) typeIndex = 1; // Middle - circle, 20 pts
                    else typeIndex = 2;                // Bottom - square, 10 pts
                    
                    aliens.push({
                        x: startX + col * (ALIEN_WIDTH + ALIEN_PADDING),
                        y: startY + row * (ALIEN_HEIGHT + ALIEN_PADDING),
                        width: ALIEN_WIDTH,
                        height: ALIEN_HEIGHT,
                        type: typeIndex,
                        alive: true
                    });
                }
            }
            
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            updateLives();
            document.getElementById('gameOver').style.display = 'none';
        }
        
        function updateLives() {
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            document.getElementById('lives').textContent = hearts || '💔';
        }
        
        function drawPlayer() {
            // Ship body
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#00cc00';
            ctx.fillRect(player.x + player.width / 2 - 5, player.y + 10, 10, 10);
            
            // Engine glow
            ctx.fillStyle = '#ff6600';
            ctx.fillRect(player.x + player.width / 2 - 8, player.y + player.height - 5, 16, 5);
        }
        
        function drawAlien(alien) {
            if (!alien.alive) return;
            
            const type = ALIEN_TYPES[alien.type];
            ctx.fillStyle = type.color;
            ctx.shadowColor = type.color;
            ctx.shadowBlur = 5;
            
            const cx = alien.x + alien.width / 2;
            const cy = alien.y + alien.height / 2;
            
            if (type.shape === 'diamond') {
                ctx.beginPath();
                ctx.moveTo(cx, alien.y);
                ctx.lineTo(alien.x + alien.width, cy);
                ctx.lineTo(cx, alien.y + alien.height);
                ctx.lineTo(alien.x, cy);
                ctx.closePath();
                ctx.fill();
            } else if (type.shape === 'circle') {
                ctx.beginPath();
                ctx.arc(cx, cy, alien.width / 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
            }
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            if (type.shape !== 'square') {
                ctx.fillRect(alien.x + 8, cy - 3, 5, 5);
                ctx.fillRect(alien.x + alien.width - 13, cy - 3, 5, 5);
            } else {
                ctx.fillRect(alien.x + 5, cy - 3, 5, 5);
                ctx.fillRect(alien.x + alien.width - 10, cy - 3, 5, 5);
            }
            
            ctx.shadowBlur = 0;
        }
        
        function drawBullets() {
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 5;
            
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, BULLET_WIDTH, BULLET_HEIGHT);
            });
            
            ctx.shadowBlur = 0;
        }
        
        function draw() {
            // Clear canvas with stars
            ctx.fillStyle = '#000033';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            ctx.fillStyle = 'white';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % canvas.width;
                const y = (i * 73) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }
            
            // Draw player
            drawPlayer();
            
            // Draw aliens
            aliens.forEach(alien => drawAlien(alien));
            
            // Draw bullets
            drawBullets();
            
            // Draw ground
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 3);
        }
        
        function update() {
            if (gameOver) return;
            
            // Move bullets
            bullets.forEach(bullet => {
                bullet.y -= bulletSpeed;
            });
            
            // Remove off-screen bullets
            bullets = bullets.filter(bullet => bullet.y > -BULLET_HEIGHT);
            
            // Check bullet-alien collisions
            bullets.forEach((bullet, bulletIndex) => {
                aliens.forEach(alien => {
                    if (alien.alive && 
                        bullet.x < alien.x + alien.width &&
                        bullet.x + BULLET_WIDTH > alien.x &&
                        bullet.y < alien.y + alien.height &&
                        bullet.y + BULLET_HEIGHT > alien.y) {
                        
                        alien.alive = false;
                        bullets.splice(bulletIndex, 1);
                        score += ALIEN_TYPES[alien.type].points;
                        document.getElementById('score').textContent = score;
                        
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('spaceInvadersHighScore', highScore);
                            document.getElementById('highScore').textContent = highScore;
                        }
                    }
                });
            });
            
            // Move aliens
            let hitEdge = false;
            aliens.forEach(alien => {
                if (alien.alive) {
                    alien.x += alienDirection * alienSpeed;
                    if (alien.x <= 0 || alien.x + alien.width >= canvas.width) {
                        hitEdge = true;
                    }
                }
            });
            
            if (hitEdge) {
                alienDirection *= -1;
                aliens.forEach(alien => {
                    if (alien.alive) {
                        alien.y += 20;
                        if (alien.y + alien.height >= player.y) {
                            loseLife();
                        }
                    }
                });
            }
            
            // Speed up as aliens are destroyed
            const aliveAliens = aliens.filter(a => a.alive).length;
            alienSpeed = 1 + (ALIEN_ROWS * ALIEN_COLS - aliveAliens) * 0.03;
            
            // Check if all aliens destroyed
            if (aliveAliens === 0) {
                // Next wave!
                init();
            }
            
            // Check if aliens reached player
            aliens.forEach(alien => {
                if (alien.alive && alien.y + alien.height >= player.y) {
                    loseLife();
                }
            });
        }
        
        function loseLife() {
            lives--;
            updateLives();
            if (lives <= 0) {
                endGame();
            } else {
                // Reset alien positions
                const startX = (canvas.width - (ALIEN_COLS * (ALIEN_WIDTH + ALIEN_PADDING))) / 2;
                const startY = 50;
                let index = 0;
                for (let row = 0; row < ALIEN_ROWS; row++) {
                    for (let col = 0; col < ALIEN_COLS; col++) {
                        aliens[index].x = startX + col * (ALIEN_WIDTH + ALIEN_PADDING);
                        aliens[index].y = startY + row * (ALIEN_HEIGHT + ALIEN_PADDING);
                        aliens[index].alive = true;
                        index++;
                    }
                }
                alienDirection = 1;
                alienSpeed = 1;
                bullets = [];
            }
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            clearInterval(gameLoop);
            init();
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 1000 / 60);
        }
        
        function shoot() {
            const now = Date.now();
            if (now - lastShot < SHOT_DELAY) return;
            lastShot = now;
            
            bullets.push({
                x: player.x + player.width / 2 - BULLET_WIDTH / 2,
                y: player.y - BULLET_HEIGHT
            });
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (gameOver && e.code !== 'KeyR') return;
            
            const speed = 8;
            
            switch(e.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    player.x -= speed;
                    if (player.x < 0) player.x = 0;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    player.x += speed;
                    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
                    break;
                case 'Space':
                    e.preventDefault();
                    shoot();
                    break;
                case 'KeyR':
                    restartGame();
                    break;
            }
        });
        
        // Touch controls
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            player.x += diff * 0.5;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            touchStartX = touchX;
        });
        
        canvas.addEventListener('touchend', () => {
            // Auto shoot on tap
            shoot();
        });
        
        // Start game
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    </script>
</body>
</html>
