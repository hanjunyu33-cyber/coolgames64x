<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔪 Knife Hit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; text-shadow: 0 0 20px #ff6b6b; }
        .score-board { font-size: 1.5rem; margin-bottom: 15px; }
        .score-board span { background: rgba(255,107,107,0.2); padding: 5px 20px; border-radius: 20px; }
        canvas { border: 3px solid #ff6b6b; border-radius: 10px; box-shadow: 0 0 30px rgba(255,107,107,0.4); }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #ff6b6b; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🔪 KNIFE HIT</h1>
    <div class="score-board">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="300" height="500"></canvas>
    <div class="instructions">Click or tap to <span>THROW</span> your knife!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const WOOD_X = 150;
        const WOOD_Y = 200;
        const WOOD_RADIUS = 60;
        const KNIFE_START_Y = 450;
        
        let wood = { rotation: 0, knives: [], rotationSpeed: 0.03 };
        let knife = { x: WOOD_X, y: KNIFE_START_Y, thrown: false, angle: 0, vy: 0 };
        let score = 0;
        let best = parseInt(localStorage.getItem('knifeHitBest')) || 0;
        let gameOver = false;
        let gameLoop;
        
        function init() {
            wood = { rotation: 0, knives: [], rotationSpeed: 0.03 + Math.random() * 0.02 };
            knife = { x: WOOD_X, y: KNIFE_START_Y, thrown: false, angle: 0, vy: 0 };
            score = 0;
            gameOver = false;
            
            // Add first knife to wood
            wood.knives.push({ angle: 0 });
            
            document.getElementById('score').textContent = '0';
            document.getElementById('best').textContent = best;
        }
        
        function drawWood() {
            ctx.save();
            ctx.translate(WOOD_X, WOOD_Y);
            ctx.rotate(wood.rotation);
            
            // Wood log
            const gradient = ctx.createLinearGradient(-WOOD_RADIUS, 0, WOOD_RADIUS, 0);
            gradient.addColorStop(0, '#8B4513');
            gradient.addColorStop(0.5, '#A0522D');
            gradient.addColorStop(1, '#8B4513');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, WOOD_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            
            // Wood rings
            ctx.strokeStyle = 'rgba(139, 69, 19, 0.5)';
            ctx.lineWidth = 2;
            for (let r = 15; r < WOOD_RADIUS; r += 15) {
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw knives stuck in wood
            wood.knives.forEach((k, i) => {
                ctx.save();
                ctx.rotate(k.angle);
                
                // Knife handle
                ctx.fillStyle = '#4a3728';
                ctx.fillRect(-8, -WOOD_RADIUS - 35, 16, 30);
                
                // Knife blade
                ctx.fillStyle = '#c0c0c0';
                ctx.beginPath();
                ctx.moveTo(-6, -WOOD_RADIUS - 35);
                ctx.lineTo(6, -WOOD_RADIUS - 35);
                ctx.lineTo(0, -WOOD_RADIUS - 55);
                ctx.closePath();
                ctx.fill();
                
                // Knife shine
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(-2, -WOOD_RADIUS - 50, 3, 20);
                
                ctx.restore();
            });
            
            ctx.restore();
        }
        
        function drawKnife() {
            if (knife.thrown || gameOver) return;
            
            // Knife handle
            ctx.fillStyle = '#4a3728';
            ctx.fillRect(knife.x - 8, knife.y - 35, 16, 30);
            
            // Knife blade
            ctx.fillStyle = '#c0c0c0';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.moveTo(knife.x - 6, knife.y - 35);
            ctx.lineTo(knife.x + 6, knife.y - 35);
            ctx.lineTo(knife.x, knife.y - 60);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillRect(knife.x - 2, knife.y - 52, 3, 20);
        }
        
        function drawBackground() {
            // Dark background with pattern
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Pattern
            ctx.fillStyle = 'rgba(255,107,107,0.03)';
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.arc(i * 50, (i * 37) % canvas.height, 30, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function draw() {
            drawBackground();
            drawWood();
            drawKnife();
            
            // Instructions
            if (wood.knives.length === 1 && !knife.thrown) {
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Click to throw!', canvas.width / 2, canvas.height - 30);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            // Rotate wood
            wood.rotation += wood.rotationSpeed;
            
            // Knife falling
            if (knife.thrown) {
                knife.y += knife.vy;
                knife.vy += 0.8;
                
                // Check collision with wood
                const knifeTip = knife.y - 60;
                const distToWood = Math.sqrt((knife.x - WOOD_X) ** 2 + (knifeTip - WOOD_Y) ** 2);
                
                if (knifeTip >= WOOD_Y - WOOD_RADIUS && knifeTip <= WOOD_Y + WOOD_RADIUS) {
                    // Check if hitting another knife
                    const hitAngle = wood.rotation;
                    let hitKnife = false;
                    
                    for (let i = 0; i < wood.knives.length; i++) {
                        const k = wood.knives[i];
                        const angleDiff = Math.abs(wood.rotation - k.angle);
                        const normalizedDiff = Math.min(angleDiff, Math.PI * 2 - angleDiff);
                        
                        if (normalizedDiff < 0.25) {
                            hitKnife = true;
                            break;
                        }
                    }
                    
                    if (hitKnife) {
                        endGame();
                    } else {
                        // Stick knife in wood
                        knife.thrown = false;
                        knife.y = KNIFE_START_Y;
                        knife.vy = 0;
                        wood.knives.push({ angle: wood.rotation });
                        score++;
                        document.getElementById('score').textContent = score;
                        
                        // Speed up wood rotation
                        wood.rotationSpeed += 0.003;
                        
                        // Check for level complete (8 knives)
                        if (wood.knives.length >= 8) {
                            levelComplete();
                        }
                    }
                }
                
                // Off screen
                if (knife.y > canvas.height + 100) {
                    endGame();
                }
            }
        }
        
        function throwKnife() {
            if (knife.thrown || gameOver) return;
            knife.thrown = true;
            knife.vy = -18;
        }
        
        function levelComplete() {
            // Reset with new wood
            wood.knives = [];
            knife = { x: WOOD_X, y: KNIFE_START_Y, thrown: false, angle: 0, vy: 0 };
            wood.rotationSpeed += 0.005;
            wood.rotation = 0;
            
            // Flash effect
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            setTimeout(() => {
                wood.knives.push({ angle: 0 });
            }, 500);
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            
            if (score > best) {
                best = score;
                localStorage.setItem('knifeHitBest', best);
            }
            
            setTimeout(() => {
                alert(`Game Over!\nScore: ${score}\nBest: ${best}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        // Controls
        canvas.addEventListener('click', throwKnife);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            throwKnife();
        });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                throwKnife();
            }
        });
        
        // Start
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    </script>
</body>
</html>
