<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Blaster - Ethan's Game!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        h1 {
            color: #ffd93d;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }
        
        .score-board {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px 30px;
            border-radius: 25px;
        }
        
        .score {
            color: #6bcb77;
            font-weight: bold;
        }
        
        canvas {
            border: 4px solid #ffd93d;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 217, 61, 0.3);
            cursor: crosshair;
        }
        
        .instructions {
            color: #a0a0a0;
            margin-top: 15px;
            font-size: 1rem;
        }
        
        .instructions span {
            color: #ffd93d;
            font-weight: bold;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 3px solid #ff6b6b;
        }
        
        .game-over h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .game-over p {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            background: #6bcb77;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>🥚 Egg Blaster 💥</h1>
    <div class="score-board">
        Score: <span class="score" id="score">0</span> | 
        Lives: <span id="lives">3</span>
    </div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <p class="instructions">
        Use <span>ARROW KEYS</span> to move | <span>CLICK</span> to shoot | <span>R</span> to restart
    </p>
    
    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>
    
    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        
        var player = {
            x: 100,
            y: 250,
            width: 40,
            height: 50,
            speed: 6,
            dx: 0,
            dy: 0,
            color: '#ffd93d',
            bullets: []
        };
        
        var enemies = [];
        var score = 0;
        var lives = 3;
        var gameRunning = true;
        var enemySpawnTimer = 0;
        var enemySpawnInterval = 60;
        
        var keys = {};
        
        document.addEventListener('keydown', function(e) {
            keys[e.key] = true;
            if (e.key === 'r' || e.key === 'R') {
                restartGame();
            }
        });
        
        document.addEventListener('keyup', function(e) {
            keys[e.key] = false;
        });
        
        canvas.addEventListener('click', function(e) {
            if (!gameRunning) return;
            
            var rect = canvas.getBoundingClientRect();
            var mouseX = e.clientX - rect.left;
            var mouseY = e.clientY - rect.top;
            
            var angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            
            player.bullets.push({
                x: player.x + player.width,
                y: player.y + player.height / 2,
                radius: 6,
                dx: Math.cos(angle) * 10,
                dy: Math.sin(angle) * 10,
                color: '#ff6b6b'
            });
        });
        
        function drawEgg(x, y, width, height, color, isEnemy) {
            ctx.fillStyle = color;
            ctx.beginPath();
            
            ctx.moveTo(x + width/2, y);
            ctx.bezierCurveTo(x + width, y, x + width, y + height * 0.7, x + width/2, y + height);
            ctx.bezierCurveTo(x, y + height * 0.7, x, y, x + width/2, y);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            var eyeY = y + height * 0.35;
            var eyeSize = isEnemy ? 6 : 8;
            ctx.beginPath();
            ctx.arc(x + width * 0.35, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.arc(x + width * 0.65, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'black';
            var pupilSize = isEnemy ? 3 : 4;
            ctx.beginPath();
            ctx.arc(x + width * 0.35 + 1, eyeY, pupilSize, 0, Math.PI * 2);
            ctx.arc(x + width * 0.65 + 1, eyeY, pupilSize, 0, Math.PI * 2);
            ctx.fill();
            
            if (isEnemy) {
                ctx.strokeStyle = '#2d5a27';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + width * 0.25, eyeY - 10);
                ctx.lineTo(x + width * 0.45, eyeY - 6);
                ctx.moveTo(x + width * 0.75, eyeY - 10);
                ctx.lineTo(x + width * 0.55, eyeY - 6);
                ctx.stroke();
            } else {
                ctx.strokeStyle = '#e6a800';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x + width/2, eyeY + 10, 6, 0, Math.PI);
                ctx.stroke();
            }
        }
        
        function drawBullet(bullet) {
            ctx.fillStyle = bullet.color;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function spawnEnemy() {
            var y = Math.random() * (canvas.height - 80) + 20;
            enemies.push({
                x: canvas.width + 50,
                y: y,
                width: 35,
                height: 45,
                speed: 2 + Math.random() * 2,
                color: '#6bcb77'
            });
        }
        
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }
        
        function update() {
            if (!gameRunning) return;
            
            player.dx = 0;
            player.dy = 0;
            
            if (keys['ArrowUp'] || keys['w'] || keys['W']) player.dy = -player.speed;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) player.dy = player.speed;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.dx = -player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.dx = player.speed;
            
            player.x += player.dx;
            player.y += player.dy;
            
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            
            player.bullets = player.bullets.filter(function(bullet) {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                return bullet.x < canvas.width && bullet.x > 0 && 
                       bullet.y < canvas.height && bullet.y > 0;
            });
            
            enemySpawnTimer++;
            if (enemySpawnTimer >= enemySpawnInterval) {
                spawnEnemy();
                enemySpawnTimer = 0;
                enemySpawnInterval = Math.max(20, enemySpawnInterval - 1);
            }
            
            enemies = enemies.filter(function(enemy) {
                enemy.x -= enemy.speed;
                
                if (checkCollision(player, enemy)) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    if (lives <= 0) {
                        gameRunning = false;
                        document.getElementById('gameOver').style.display = 'block';
                        document.getElementById('finalScore').textContent = score;
                    }
                    return false;
                }
                
                for (var i = player.bullets.length - 1; i >= 0; i--) {
                    var bullet = player.bullets[i];
                    var bulletRect = {
                        x: bullet.x - bullet.radius,
                        y: bullet.y - bullet.radius,
                        width: bullet.radius * 2,
                        height: bullet.radius * 2
                    };
                    
                    if (checkCollision(bulletRect, enemy)) {
                        score += 10;
                        document.getElementById('score').textContent = score;
                        player.bullets.splice(i, 1);
                        return false;
                    }
                }
                
                return enemy.x > -50;
            });
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (var i = 0; i < 50; i++) {
                var x = (i * 73) % canvas.width;
                var y = (i * 47) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }
            
            player.bullets.forEach(drawBullet);
            enemies.forEach(function(enemy) {
                drawEgg(enemy.x, enemy.y, enemy.width, enemy.height, enemy.color, true);
            });
            drawEgg(player.x, player.y, player.width, player.height, player.color, false);
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function restartGame() {
            player.x = 100;
            player.y = 250;
            player.bullets = [];
            enemies = [];
            score = 0;
            lives = 3;
            gameRunning = true;
            enemySpawnInterval = 60;
            enemySpawnTimer = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('gameOver').style.display = 'none';
        }
        
        gameLoop();
    </script>
</body>
</html>
