<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Pong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; text-shadow: 0 0 20px #00ff00; }
        .score-board { font-size: 1.5rem; margin-bottom: 15px; display: flex; gap: 50px; }
        .score-board span { color: #00ff00; }
        canvas { border: 3px solid #00ff00; border-radius: 10px; box-shadow: 0 0 30px rgba(0,255,0,0.3); }
        .instructions { margin-top: 15px; color: #666; font-size: 1rem; }
        .instructions span { color: #00ff00; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .mode-select { margin-bottom: 15px; }
        .mode-btn {
            background: rgba(0,255,0,0.2); color: #0f0;
            border: 2px solid #0f0; padding: 10px 25px;
            border-radius: 25px; cursor: pointer; font-size: 1rem;
            margin: 0 5px; transition: all 0.3s;
        }
        .mode-btn.active { background: #0f0; color: #000; }
        .mode-btn:hover { background: rgba(0,255,0,0.4); }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🏓 PONG</h1>
    <div class="mode-select">
        <button class="mode-btn active" onclick="setMode('ai')">vs Computer 🤖</button>
        <button class="mode-btn" onclick="setMode('2p')">2 Players 👥</button>
    </div>
    <div class="score-board">
        <span>Player: <strong id="p1Score">0</strong></span>
        <span>Computer: <strong id="p2Score">0</strong></span>
    </div>
    <canvas id="gameCanvas" width="500" height="350"></canvas>
    <div class="instructions"><span>W/S</span> or <span>↑/↓</span> to move | <span>SPACE</span> to serve</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 70;
        const BALL_SIZE = 12;
        const PADDLE_SPEED = 7;
        const AI_SPEED = 4;
        
        let p1 = { x: 20, y: 140, score: 0 };
        let p2 = { x: canvas.width - 30, y: 140, score: 0 };
        let ball = { x: 250, y: 175, vx: 0, vy: 0, speed: 6 };
        let gameLoop;
        let vsAI = true;
        let ballServed = false;
        let keys = { w: false, s: false, up: false, down: false };
        
        function setMode(mode) {
            vsAI = mode === 'ai';
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            resetGame();
        }
        
        function resetGame() {
            p1.score = 0;
            p2.score = 0;
            p1.y = 140;
            p2.y = 140;
            document.getElementById('p1Score').textContent = '0';
            document.getElementById('p2Score').textContent = '0';
            serveBall();
        }
        
        function serveBall() {
            ball.x = 250;
            ball.y = 175;
            ballServed = false;
        }
        
        function serve() {
            if (ballServed) return;
            ballServed = true;
            const angle = (Math.random() - 0.5) * Math.PI / 3;
            const dir = Math.random() > 0.5 ? 1 : -1;
            ball.vx = Math.cos(angle) * ball.speed * dir;
            ball.vy = Math.sin(angle) * ball.speed;
        }
        
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }
        
        function drawBall() {
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_SIZE, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawNet() {
            ctx.strokeStyle = 'rgba(0,255,0,0.3)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawNet();
            
            // Paddles
            drawRect(p1.x, p1.y, PADDLE_WIDTH, PADDLE_HEIGHT, '#00ff00');
            drawRect(p2.x, p2.y, PADDLE_WIDTH, PADDLE_HEIGHT, vsAI ? '#ff5555' : '#00ff00');
            
            // Ball
            drawBall();
            
            // Instructions if not served
            if (!ballServed) {
                ctx.fillStyle = '#666';
                ctx.font = '16px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('Press SPACE to serve', canvas.width / 2, canvas.height - 20);
            }
        }
        
        function update() {
            // Player 1 movement
            if (keys.w || keys.up) p1.y -= PADDLE_SPEED;
            if (keys.s || keys.down) p1.y += PADDLE_SPEED;
            
            // Clamp player 1
            if (p1.y < 0) p1.y = 0;
            if (p1.y > canvas.height - PADDLE_HEIGHT) p1.y = canvas.height - PADDLE_HEIGHT;
            
            // AI movement (Player 2)
            if (vsAI) {
                const paddleCenter = p2.y + PADDLE_HEIGHT / 2;
                if (paddleCenter < ball.y - 10) p2.y += AI_SPEED;
                if (paddleCenter > ball.y + 10) p2.y -= AI_SPEED;
            } else {
                // Player 2 manual control (using arrow keys already handled)
            }
            
            // Clamp player 2
            if (p2.y < 0) p2.y = 0;
            if (p2.y > canvas.height - PADDLE_HEIGHT) p2.y = canvas.height - PADDLE_HEIGHT;
            
            // Ball movement
            if (ballServed) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                // Top/bottom bounce
                if (ball.y < BALL_SIZE) {
                    ball.y = BALL_SIZE;
                    ball.vy *= -1;
                }
                if (ball.y > canvas.height - BALL_SIZE) {
                    ball.y = canvas.height - BALL_SIZE;
                    ball.vy *= -1;
                }
                
                // Paddle 1 collision
                if (ball.x < p1.x + PADDLE_WIDTH &&
                    ball.y > p1.y && ball.y < p1.y + PADDLE_HEIGHT) {
                    ball.vx = Math.abs(ball.vx) * 1.05;
                    ball.x = p1.x + PADDLE_WIDTH + BALL_SIZE;
                    
                    // Add angle based on where ball hit paddle
                    const hitPos = (ball.y - p1.y) / PADDLE_HEIGHT;
                    ball.vy = (hitPos - 0.5) * 10;
                }
                
                // Paddle 2 collision
                if (ball.x > p2.x - BALL_SIZE &&
                    ball.y > p2.y && ball.y < p2.y + PADDLE_HEIGHT) {
                    ball.vx = -Math.abs(ball.vx) * 1.05;
                    ball.x = p2.x - BALL_SIZE;
                    
                    const hitPos = (ball.y - p2.y) / PADDLE_HEIGHT;
                    ball.vy = (hitPos - 0.5) * 10;
                }
                
                // Score
                if (ball.x < 0) {
                    p2.score++;
                    document.getElementById('p2Score').textContent = p2.score;
                    serveBall();
                }
                if (ball.x > canvas.width) {
                    p1.score++;
                    document.getElementById('p1Score').textContent = p1.score;
                    serveBall();
                }
                
                // Speed cap
                ball.vx = Math.max(-12, Math.min(12, ball.vx));
                ball.vy = Math.max(-8, Math.min(8, ball.vy));
            }
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') keys.w = true;
            if (e.code === 'KeyS') keys.s = true;
            if (e.code === 'ArrowUp') { keys.up = true; e.preventDefault(); }
            if (e.code === 'ArrowDown') { keys.down = true; e.preventDefault(); }
            if (e.code === 'Space') { serve(); e.preventDefault(); }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') keys.w = false;
            if (e.code === 'KeyS') keys.s = false;
            if (e.code === 'ArrowUp') keys.up = false;
            if (e.code === 'ArrowDown') keys.down = false;
        });
        
        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            p1.y = mouseY - PADDLE_HEIGHT / 2;
            if (p1.y < 0) p1.y = 0;
            if (p1.y > canvas.height - PADDLE_HEIGHT) p1.y = canvas.height - PADDLE_HEIGHT;
        });
        
        canvas.addEventListener('click', serve);
        
        // Start
        serveBall();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    </script>
</body>
</html>
