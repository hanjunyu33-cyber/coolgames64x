<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐸 Doodle Jump</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #333;
            text-shadow: 2px 2px 0 #fff;
        }
        .score-board {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #333;
            background: rgba(255,255,255,0.5);
            padding: 5px 20px;
            border-radius: 20px;
        }
        canvas {
            border: 4px solid #333;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: linear-gradient(180deg, #87CEEB 0%, #98D8AA 100%);
        }
        .instructions {
            margin-top: 15px;
            font-size: 1rem;
            color: #555;
            background: rgba(255,255,255,0.7);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .instructions span {
            background: #333;
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border: 4px solid #ff6b6b;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #gameOver h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        #gameOver p {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }
        #gameOver .high {
            font-size: 1rem;
            color: #888;
            margin-bottom: 20px;
        }
        #gameOver button {
            background: #4ECDC4;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #3BA99C;
        }
        #gameOver button:hover {
            background: #3BA99C;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #2E8B84;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            color: #333;
            border: 2px solid #333;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
        }
        .back-btn:hover {
            background: #333;
            color: white;
        }
        .tilt-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🐸 DOODLE JUMP</h1>
    <div class="score-board">Score: <span id="score">0</span> | Best: <span id="highScore">0</span></div>
    <canvas id="gameCanvas" width="350" height="500"></canvas>
    <div class="instructions">
        <span>← →</span> Arrow Keys to move | Jump on platforms!
        <div class="tilt-hint">(Tilt your device to move on mobile!)</div>
    </div>
    
    <div id="gameOver">
        <h2>😵 Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <p class="high">Best: <span id="finalHigh">0</span></p>
        <button onclick="restartGame()">TRY AGAIN 🔄</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game settings
        const GRAVITY = 0.4;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 6;
        const PLATFORM_WIDTH = 70;
        const PLATFORM_HEIGHT = 15;
        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 40;
        
        let player = {
            x: 155,
            y: 300,
            vx: 0,
            vy: 0,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            jumping: false
        };
        
        let platforms = [];
        let cameraY = 0;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('doodleJumpHighScore')) || 0;
        let gameOver = false;
        let gameLoop;
        let lastHeight = 0;
        
        // Platform types
        const PLATFORM_TYPES = {
            normal: { color: '#4ECDC4', shadow: '#3BA99C' },
            moving: { color: '#FFE66D', shadow: '#DDD35C' },
            breaking: { color: '#FF6B6B', shadow: '#DD5C5C' }
        };
        
        function init() {
            player = {
                x: canvas.width / 2 - PLAYER_WIDTH / 2,
                y: 300,
                vx: 0,
                vy: 0,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                jumping: false
            };
            
            platforms = [];
            cameraY = 0;
            score = 0;
            gameOver = false;
            lastHeight = 0;
            
            // Create initial platforms
            // First platform directly under player
            platforms.push({
                x: player.x - 15,
                y: player.y + player.height,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                type: 'normal'
            });
            
            // Generate more platforms
            for (let i = 0; i < 15; i++) {
                createPlatform(canvas.height - 100 - i * 50);
            }
            
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOver').style.display = 'none';
        }
        
        function createPlatform(y) {
            const x = Math.random() * (canvas.width - PLATFORM_WIDTH);
            
            // Determine platform type (rare types appear less often)
            let type = 'normal';
            const rand = Math.random();
            if (rand > 0.92) type = 'breaking';
            else if (rand > 0.8) type = 'moving';
            
            const platform = {
                x: x,
                y: y,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                type: type,
                moveDir: Math.random() > 0.5 ? 1 : -1,
                moveSpeed: 1 + Math.random() * 1.5,
                broken: false,
                breakTimer: 0
            };
            
            platforms.push(platform);
            return platform;
        }
        
        function drawPlayer() {
            const screenY = player.y - cameraY;
            
            // Body (green frog-like creature)
            ctx.fillStyle = '#7BC043';
            ctx.beginPath();
            ctx.ellipse(
                player.x + player.width / 2,
                screenY + player.height / 2 + 5,
                player.width / 2 - 5,
                player.height / 2 - 5,
                0, 0, Math.PI * 2
            );
            ctx.fill();
            
            // Belly
            ctx.fillStyle = '#98D8AA';
            ctx.beginPath();
            ctx.ellipse(
                player.x + player.width / 2,
                screenY + player.height / 2 + 8,
                player.width / 3,
                player.height / 3,
                0, 0, Math.PI * 2
            );
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(player.x + 12, screenY + 10, 8, 0, Math.PI * 2);
            ctx.arc(player.x + player.width - 12, screenY + 10, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Pupils (look in direction of movement)
            ctx.fillStyle = 'black';
            const pupilOffset = player.vx > 0 ? 2 : (player.vx < 0 ? -2 : 0);
            ctx.beginPath();
            ctx.arc(player.x + 12 + pupilOffset, screenY + 10, 4, 0, Math.PI * 2);
            ctx.arc(player.x + player.width - 12 + pupilOffset, screenY + 10, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Smile
            ctx.strokeStyle = '#5DA427';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, screenY + 22, 8, 0.2, Math.PI - 0.2);
            ctx.stroke();
            
            // Feet when jumping
            if (player.vy < 0) {
                ctx.fillStyle = '#5DA427';
                ctx.beginPath();
                ctx.ellipse(player.x + 8, screenY + player.height - 2, 8, 5, -0.3, 0, Math.PI * 2);
                ctx.ellipse(player.x + player.width - 8, screenY + player.height - 2, 8, 5, 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawPlatform(platform) {
            const screenY = platform.y - cameraY;
            
            // Don't draw if off screen
            if (screenY > canvas.height + 50 || screenY < -50) return;
            
            const type = PLATFORM_TYPES[platform.type];
            
            // Platform shadow
            ctx.fillStyle = platform.shadow;
            ctx.beginPath();
            ctx.roundRect(platform.x, screenY + 3, platform.width, platform.height, 5);
            ctx.fill();
            
            // Platform top
            if (platform.type === 'breaking' && platform.broken) {
                ctx.fillStyle = '#ccc';
            } else {
                ctx.fillStyle = type.color;
            }
            ctx.beginPath();
            ctx.roundRect(platform.x, screenY, platform.width, platform.height, 5);
            ctx.fill();
            
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.roundRect(platform.x + 5, screenY + 2, platform.width - 10, 4, 2);
            ctx.fill();
            
            // Moving platform indicator
            if (platform.type === 'moving') {
                ctx.fillStyle = '#FF6B6B';
                ctx.beginPath();
                ctx.arc(platform.x + 10, screenY + platform.height / 2, 3, 0, Math.PI * 2);
                ctx.arc(platform.x + platform.width - 10, screenY + platform.height / 2, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Breaking platform cracks
            if (platform.type === 'breaking') {
                ctx.strokeStyle = platform.shadow;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(platform.x + 20, screenY + 3);
                ctx.lineTo(platform.x + 25, screenY + platform.height - 3);
                ctx.moveTo(platform.x + 45, screenY + 3);
                ctx.lineTo(platform.x + 40, screenY + platform.height - 3);
                ctx.stroke();
            }
        }
        
        function draw() {
            // Sky gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw clouds (parallax)
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            for (let i = 0; i < 5; i++) {
                const cloudX = ((i * 100 + cameraY * 0.1) % (canvas.width + 100)) - 50;
                const cloudY = 50 + (i * 80) % 200;
                drawCloud(cloudX, cloudY);
            }
            
            // Draw platforms
            platforms.forEach(platform => drawPlatform(platform));
            
            // Draw player
            drawPlayer();
        }
        
        function drawCloud(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.arc(x + 25, y - 10, 25, 0, Math.PI * 2);
            ctx.arc(x + 50, y, 20, 0, Math.PI * 2);
            ctx.arc(x + 25, y + 5, 15, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function update() {
            if (gameOver) return;
            
            // Apply gravity
            player.vy += GRAVITY;
            player.y += player.vy;
            player.x += player.vx;
            
            // Friction
            player.vx *= 0.9;
            
            // Wrap around screen edges
            if (player.x + player.width < 0) {
                player.x = canvas.width;
            } else if (player.x > canvas.width) {
                player.x = -player.width;
            }
            
            // Update moving platforms
            platforms.forEach(platform => {
                if (platform.type === 'moving' && !platform.broken) {
                    platform.x += platform.moveDir * platform.moveSpeed;
                    if (platform.x <= 0 || platform.x + platform.width >= canvas.width) {
                        platform.moveDir *= -1;
                    }
                }
                
                // Update breaking platforms
                if (platform.type === 'breaking' && platform.broken) {
                    platform.breakTimer++;
                }
            });
            
            // Remove broken platforms
            platforms = platforms.filter(p => !(p.type === 'breaking' && p.broken && p.breakTimer > 10));
            
            // Check platform collisions (only when falling)
            if (player.vy > 0) {
                platforms.forEach(platform => {
                    if (platform.broken) return;
                    
                    const playerBottom = player.y + player.height;
                    const playerPrevBottom = playerBottom - player.vy;
                    
                    if (playerPrevBottom <= platform.y &&
                        playerBottom >= platform.y &&
                        player.x + player.width > platform.x &&
                        player.x < platform.x + platform.width) {
                        
                        // Jump!
                        player.y = platform.y - player.height;
                        player.vy = JUMP_FORCE;
                        player.jumping = true;
                        
                        // Handle breaking platforms
                        if (platform.type === 'breaking') {
                            platform.broken = true;
                        }
                    }
                });
            }
            
            // Camera follows player (smooth)
            const targetCameraY = player.y - canvas.height / 3;
            if (targetCameraY < cameraY) {
                cameraY += (targetCameraY - cameraY) * 0.1;
            }
            
            // Update score based on height
            const currentHeight = Math.floor(-player.y / 10);
            if (currentHeight > lastHeight) {
                score = currentHeight;
                lastHeight = currentHeight;
                document.getElementById('score').textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('doodleJumpHighScore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
            }
            
            // Generate new platforms as player goes up
            const highestPlatform = Math.min(...platforms.map(p => p.y));
            while (highestPlatform > cameraY - 100) {
                const newY = Math.min(...platforms.map(p => p.y)) - 40 - Math.random() * 30;
                createPlatform(newY);
            }
            
            // Remove platforms that are way below camera
            platforms = platforms.filter(p => p.y < cameraY + canvas.height + 100);
            
            // Check game over (fell below camera)
            if (player.y - cameraY > canvas.height + 100) {
                endGame();
            }
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHigh').textContent = highScore;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            clearInterval(gameLoop);
            init();
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 1000 / 60);
        }
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (gameOver && e.code !== 'Space' && e.code !== 'Enter') return;
            
            switch(e.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    player.vx = -MOVE_SPEED;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    player.vx = MOVE_SPEED;
                    break;
                case 'Space':
                case 'Enter':
                    if (gameOver) restartGame();
                    break;
            }
        });
        
        // Touch controls (tilt to move)
        let touchStartX = 0;
        let isTouching = false;
        
        canvas.addEventListener('touchstart', (e) => {
            isTouching = true;
            touchStartX = e.touches[0].clientX;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isTouching) return;
            
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            
            if (Math.abs(diff) > 10) {
                player.vx = diff * 0.1;
                if (player.vx > MOVE_SPEED) player.vx = MOVE_SPEED;
                if (player.vx < -MOVE_SPEED) player.vx = -MOVE_SPEED;
                touchStartX = touchX;
            }
        });
        
        canvas.addEventListener('touchend', () => {
            isTouching = false;
        });
        
        // Device orientation (tilt)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (gameOver) return;
                if (e.gamma !== null) {
                    player.vx = e.gamma * 0.3;
                    if (player.vx > MOVE_SPEED) player.vx = MOVE_SPEED;
                    if (player.vx < -MOVE_SPEED) player.vx = -MOVE_SPEED;
                }
            });
        }
        
        // Mouse controls
        let mouseX = null;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            const centerX = canvas.width / 2;
            player.vx = (mouseX - centerX) * 0.05;
        });
        
        // Start game
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    </script>
</body>
</html>
