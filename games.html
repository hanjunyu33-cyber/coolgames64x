        let currentCat = 'all';
        
        function renderGames() {

            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = games;
            if (currentCat !== 'all') filtered = filtered.filter(g => g.category === currentCat);
            if (search) filtered = filtered.filter(g => g.name.toLowerCase().includes(search) || g.category.includes(search));
            grid.innerHTML = filtered.map(game => `<div class="game-card" onclick="playGame('${game.url}')"><div class="game-rating"><span>⭐</span> ${game.rating}</div><div class="game-thumb">${game.icon}</div><div class="game-name">${game.name}</div><div class="game-cat">${game.category}</div></div>`).join('');

        function filterCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
