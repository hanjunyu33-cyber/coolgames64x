<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="LFolYFY1ySO4aIcMbyo8EdJKYLqHW9MS6_B1y7e5MPQ" />
    <title>Cool Games - 50 Free Games!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .search-bar {
            padding: 20px;
            text-align: center;
        }
        .search-bar input {
            width: 300px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
        .cat-filter {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 20px 20px;
        }
        .cat-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cat-btn:hover, .cat-btn.active {
            background: #667eea;
            border-color: #667eea;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: linear-gradient(145deg, #2d2d4d, #1a1a3d);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            border-color: #667eea;
        }
        .game-thumb {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .game-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .game-cat span {
            background: rgba(102, 126, 234, 0.3);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-transform: capitalize;
        }
        .footer {
            text-align: center;
            padding: 30px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 Cool Games</h1>
        <p>50 FREE GAMES - ALL CUSTOM MADE!</p>
    </div>
    
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search games..." onkeyup="filterGames()">
    </div>
    
    <div class="cat-filter">
        <button class="cat-btn active" onclick="filterCat('all')">All</button>
        <button class="cat-btn" onclick="filterCat('action')">Action</button>
        <button class="cat-btn" onclick="filterCat('puzzle')">Puzzle</button>
        <button class="cat-btn" onclick="filterCat('sports')">Sports</button>
        <button class="cat-btn" onclick="filterCat('racing')">Racing</button>
        <button class="cat-btn" onclick="filterCat('classic')">Classic</button>
    </div>
    
    <div class="games-grid" id="gamesGrid"></div>
    
    <div class="footer">
        <p>🎮 Made by Ethan - Age 7 💪</p>
    </div>

    <script>

            { name: "Frogger", icon: "🐸", category: "classic", url: "frogger.html" },
            { name: "Pac-Man", icon: "👻", category: "classic", url: "pac-man.html" },
            { name: "Tetris", icon: "🧱", category: "classic", url: "tetris.html" },
            { name: "Asteroids", icon: "🚀", category: "classic", url: "asteroids.html" },
            { name: "Galaga", icon: "🚀", category: "classic", url: "galaga.html" },
            { name: "Helicopter", icon: "🚁", category: "action", url: "helicopter.html" },
            { name: "Slot Machine", icon: "🎰", category: "classic", url: "slot-machine.html" }
        ];
        
        let currentCat = 'all';
        
        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = games;
            
            if (currentCat !== 'all') {
                filtered = filtered.filter(g => g.category === currentCat);
            }
            
            if (search) {
                filtered = filtered.filter(g => g.name.toLowerCase().includes(search));
            }
            
            grid.innerHTML = filtered.map(game => `
                <div class="game-card" onclick="playGame('${game.url}', '${game.name}')">
                    <div class="game-thumb">${game.icon}</div>
                    <div class="game-name">${game.name}</div>
                    <div class="game-cat"><span>${game.category}</span></div>
                </div>
            `).join('');
        }
        
        function filterCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderGames();
        }
        
        function filterGames() {
            renderGames();
        }
        
        function playGame(url, name) {
            window.open(url, '_blank');
        }
        
        renderGames();
    </script>
