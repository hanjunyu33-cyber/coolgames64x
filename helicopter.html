<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚁 Helicopter Flight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #f39c12; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(243,156,18,0.2); padding: 5px 15px; border-radius: 15px; margin: 0 10px; }
        canvas { border: 3px solid #f39c12; border-radius: 10px; background: #000; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #f39c12; padding: 3px 10px; border-radius: 5px; color: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🚁 HELICOPTER FLIGHT</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Best: <strong id="best">0</strong></span>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="instructions"><span>SPACE</span> or <span>↑</span> to fly up | Don't hit the walls!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let heli = { x: 80, y: 250, vy: 0 };
        let obstacles = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('helicopterBest')) || 0;
        let gameLoop;
        let gameOver = false;
        let particles = [];
        let rotorAngle = 0;
        
        document.getElementById('best').textContent = best;
        
        function init() {
            heli = { x: 80, y: 250, vy: 0 };
            obstacles = [];
            particles = [];
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = '0';
        }
        
        function createObstacle() {
            // Top and bottom walls with gap
            const gap = 150;
            const minY = 50;
            const maxY = canvas.height - gap - 50;
            const gapY = Math.random() * (maxY - minY) + minY;
            
            obstacles.push({
                x: canvas.width,
                gapY: gapY,
                gapHeight: gap,
                passed: false
            });
        }
        
        function drawHeli() {
            ctx.save();
            ctx.translate(heli.x, heli.y);
            
            // Body
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.ellipse(0, 0, 30, 18, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.ellipse(15, -2, 12, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Tail
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(-35, -5, 20, 10);
            ctx.beginPath();
            ctx.moveTo(-35, -8);
            ctx.lineTo(-45, 0);
            ctx.lineTo(-35, 8);
            ctx.closePath();
            ctx.fill();
            
            // Tail rotor
            ctx.fillStyle = '#95a5a6';
            ctx.save();
            ctx.translate(-40, 0);
            ctx.rotate(rotorAngle * 3);
            ctx.fillRect(-2, -15, 4, 30);
            ctx.restore();
            
            // Main rotor
            ctx.fillStyle = '#7f8c8d';
            ctx.save();
            ctx.translate(0, -20);
            ctx.rotate(rotorAngle);
            ctx.fillRect(-40, -3, 80, 6);
            ctx.restore();
            
            // Rotor hub
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.arc(0, -18, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawObstacle(obs) {
            // Top obstacle
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(obs.x, 0, 50, obs.gapY);
            
            // Bottom obstacle  
            ctx.fillRect(obs.x, obs.gapY + obs.gapHeight, 50, canvas.height - obs.gapY - obs.gapHeight);
            
            // Highlights
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(obs.x + 5, 0, 5, obs.gapY);
            ctx.fillRect(obs.x + 5, obs.gapY + obs.gapHeight, 5, canvas.height - obs.gapY - obs.gapHeight);
            
            // Bolts
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(obs.x + 25, obs.gapY - 15, 5, 0, Math.PI * 2);
            ctx.arc(obs.x + 25, obs.gapY + obs.gapHeight + 15, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawParticles() {
            particles.forEach((p, i) => {
                ctx.fillStyle = `rgba(243, 156, 18, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
        }
        
        function createExplosion() {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: heli.x,
                    y: heli.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 5 + 2,
                    life: 1
                });
            }
        }
        
        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73 + score * 0.1) % canvas.width;
                const y = (i * 37) % canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }
            
            // Ground
            ctx.fillStyle = '#2d5016';
            ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
            
            // Grass
            ctx.fillStyle = '#27ae60';
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 30);
                ctx.lineTo(i + 10, canvas.height - 40);
                ctx.lineTo(i + 20, canvas.height - 30);
                ctx.fill();
            }
            
            obstacles.forEach(drawObstacle);
            drawParticles();
            drawHeli();
        }
        
        function update() {
            if (gameOver) return;
            
            // Helicopter physics
            heli.vy += 0.4; // Gravity
            heli.vy = Math.max(-8, Math.min(8, heli.vy)); // Terminal velocity
            heli.y += heli.vy;
            
            // Rotor animation
            rotorAngle += 0.3;
            
            // Create obstacles
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 200) {
                if (Math.random() < 0.02) createObstacle();
            }
            
            // Move obstacles
            obstacles.forEach(obs => {
                obs.x -= 3;
                
                // Score when passed
                if (!obs.passed && obs.x + 50 < heli.x) {
                    obs.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }
            });
            
            // Remove off-screen obstacles
            obstacles = obstacles.filter(obs => obs.x > -60);
            
            // Collision with top/bottom
            if (heli.y < 20 || heli.y > canvas.height - 50) {
                endGame();
            }
            
            // Collision with obstacles
            obstacles.forEach(obs => {
                if (heli.x + 25 > obs.x && heli.x - 25 < obs.x + 50) {
                    if (heli.y - 15 < obs.gapY || heli.y + 15 > obs.gapY + obs.gapHeight) {
                        endGame();
                    }
                }
            });
            
            // Engine particles
            if (Math.random() < 0.3) {
                particles.push({
                    x: heli.x - 35,
                    y: heli.y,
                    vx: -2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 3 + 1,
                    life: 0.5
                });
            }
        }
        
        function endGame() {
            gameOver = true;
            createExplosion();
            
            if (score > best) {
                best = score;
                localStorage.setItem('helicopterBest', best);
                document.getElementById('best').textContent = best;
            }
            
            setTimeout(() => {
                alert(`💥 CRASH! 💥\n\nScore: ${score}\nBest: ${best}\n\nClick OK to fly again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 500);
        }
        
        function flyUp() {
            if (gameOver) return;
            heli.vy = -7;
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                flyUp();
            }
        });
        
        canvas.addEventListener('click', flyUp);
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            flyUp();
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    </script>
</body>
</html>
