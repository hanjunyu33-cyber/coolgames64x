<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Darts Championship</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2rem; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 15px; font-size: 0.9rem; }
        .game-area { display: flex; gap: 30px; align-items: flex-start; }
        .left-panel { text-align: center; }
        .score-board { 
            background: rgba(255,255,255,0.1); 
            padding: 15px 25px; 
            border-radius: 15px; 
            margin-bottom: 15px;
        }
        .score-row { display: flex; justify-content: space-between; gap: 20px; margin: 5px 0; }
        .score-label { color: #888; }
        .score-value { font-weight: bold; font-size: 1.2rem; }
        .score-value.highlight { color: #f1c40f; }
        .power-container { margin-top: 15px; }
        .power-label { font-size: 0.9rem; margin-bottom: 5px; }
        .power-bar {
            width: 150px; height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto;
        }
        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #f1c40f, #e74c3c);
            width: 0%;
            transition: width 0.05s;
        }
        .wind-indicator {
            margin-top: 15px;
            padding: 10px;
            background: rgba(52, 152, 219, 0.2);
            border-radius: 10px;
        }
        .wind-arrow {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }
        canvas { border-radius: 10px; }
        .right-panel { text-align: center; }
        .stats-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; }
        .rounds-list { max-height: 200px; overflow-y: auto; }
        .round-item {
            display: flex; justify-content: space-between;
            padding: 5px 10px; margin: 3px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .instructions {
            margin-top: 10px; color: #888; font-size: 0.85rem;
        }
        .hit-score {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🎯 Darts Championship</h1>
    <div class="subtitle">Classic 301 - First to 0 Wins!</div>
    
    <div class="game-area">
        <div class="left-panel">
            <div class="score-board">
                <div class="score-row">
                    <span class="score-label">Score:</span>
                    <span class="score-value highlight" id="score">301</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Round:</span>
                    <span class="score-value" id="round">1</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Darts Left:</span>
                    <span class="score-value" id="darts">3</span>
                </div>
                <div class="power-container">
                    <div class="power-label">🎯 Power (Hold Click)</div>
                    <div class="power-bar">
                        <div class="power-fill" id="powerFill"></div>
                    </div>
                </div>
                <div class="wind-indicator">
                    <div class="wind-label">💨 Wind</div>
                    <div class="wind-arrow" id="windArrow">➡️</div>
                    <div id="windStrength">Calm</div>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="450" height="550"></canvas>
        
        <div class="right-panel">
            <div class="stats-box">
                <div class="stat-row">
                    <span class="score-label">This Round:</span>
                    <span class="score-value" id="roundScore">0</span>
                </div>
                <div class="stat-row">
                    <span class="score-label">Best Hit:</span>
                    <span class="score-value" id="bestHit">-</span>
                </div>
            </div>
            <div class="stats-box">
                <div class="score-label">Round History</div>
                <div class="rounds-list" id="roundsList"></div>
            </div>
        </div>
    </div>
    
    <div class="instructions">
        <strong>How to Play:</strong> 
        Hold CLICK to charge power, release to throw! 
        Aim for the numbers. First to reduce score to 0 wins!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Audio context for sounds
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'throw') {
                osc.frequency.value = 300;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                osc.frequency.value = 500;
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'bullseye') {
                osc.frequency.value = 800;
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'bust') {
                osc.frequency.value = 150;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }
        
        // Game state
        let gameState = {
            score: 301,
            round: 1,
            dartsLeft: 3,
            roundScore: 0,
            bestHit: 0,
            throwing: false,
            charging: false,
            chargeStart: 0,
            power: 0,
            wind: 0,
            dart: { x: 225, y: 500, vx: 0, vy: 0, angle: 0 },
            landedDarts: [],
            roundHistory: [],
            gameOver: false,
            won: false
        };
        
        const dartboard = {
            cx: 225,
            cy: 220,
            outerRadius: 150,
            doubleRing: 150,
            tripleRing: 99,
            innerBull: 15,
            outerBull: 35,
            
            // Standard dartboard numbers
            numbers: [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5],
            getNumberAngle: function(i) {
                return (i * 18 - 90) * Math.PI / 180;
            }
        };
        
        function init() {
            gameState = {
                score: 301,
                round: 1,
                dartsLeft: 3,
                roundScore: 0,
                bestHit: 0,
                throwing: false,
                charging: false,
                chargeStart: 0,
                power: 0,
                wind: Math.floor(Math.random() * 5) - 2,
                dart: { x: 225, y: 500, vx: 0, vy: 0, angle: 0 },
                landedDarts: [],
                roundHistory: gameState.roundHistory,
                gameOver: false,
                won: false
            };
            updateWindDisplay();
            updateUI();
        }
        
        function updateWindDisplay() {
            const windArrow = document.getElementById('windArrow');
            const windStrength = document.getElementById('windStrength');
            
            if (Math.abs(gameState.wind) < 0.5) {
                windArrow.textContent = '➡️';
                windArrow.style.transform = 'rotate(0deg)';
                windStrength.textContent = 'Calm';
            } else if (gameState.wind < 0) {
                windArrow.textContent = '←';
                windArrow.style.transform = `rotate(${Math.abs(gameState.wind) * 15}deg)`;
                windStrength.textContent = `Wind: ${Math.abs(gameState.wind).toFixed(1)}`;
            } else {
                windArrow.textContent = '→';
                windArrow.style.transform = `rotate(${gameState.wind * 15}deg)`;
                windStrength.textContent = `Wind: ${gameState.wind.toFixed(1)}`;
            }
        }
        
        function drawDartboard() {
            const { cx, cy, outerRadius, doubleRing, tripleRing, innerBull, outerBull, numbers, getNumberAngle } = dartboard;
            
            // Draw outer black
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(cx, cy, outerRadius + 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw segments
            for (let i = 0; i < 20; i++) {
                const startAngle = getNumberAngle(i) - Math.PI / 20;
                const endAngle = getNumberAngle(i) + Math.PI / 20;
                const midAngle = getNumberAngle(i);
                
                // Calculate radius positions
                const innerDouble = outerRadius * 0.90;  // ~135
                const outerTriple = tripleRing;  // ~99
                const innerTriple = tripleRing * 0.75;  // ~74
                const outerSingle1 = tripleRing * 0.55;  // ~54
                const innerSingle2 = innerBull + 5;
                const outerSingle2 = innerSingle2 + 10;
                
                // Draw outer single (black)
                ctx.fillStyle = i % 2 === 0 ? '#000' : '#fff';
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(midAngle) * innerTriple, cy + Math.sin(midAngle) * innerTriple);
                ctx.arc(cx, cy, outerTriple, midAngle - Math.PI/36, midAngle + Math.PI/36);
                ctx.lineTo(cx + Math.cos(midAngle) * innerTriple, cy + Math.sin(midAngle) * innerTriple);
                ctx.fill();
                
                // Draw triple ring (red/green)
                const isEven = i % 2 === 0;
                ctx.fillStyle = '#000'; // Clear
                
                // Double ring
                ctx.fillStyle = isEven ? '#c0392b' : '#27ae60';
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(midAngle) * innerDouble, cy + Math.sin(midAngle) * innerDouble);
                ctx.arc(cx, cy, doubleRing, midAngle - Math.PI/20, midAngle + Math.PI/20);
                ctx.lineTo(cx + Math.cos(midAngle) * innerDouble, cy + Math.sin(midAngle) * innerDouble);
                ctx.fill();
                
                // Wire for double
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, doubleRing, midAngle - Math.PI/20, midAngle + Math.PI/20);
                ctx.stroke();
                
                // Triple ring (black/cream or red/green segments)
                // Simplified: just use red/green alternating
                ctx.fillStyle = isEven ? '#c0392b' : '#27ae60';
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(midAngle) * (outerTriple - 8), cy + Math.sin(midAngle) * (outerTriple - 8));
                ctx.arc(cx, cy, tripleRing, midAngle - Math.PI/20, midAngle + Math.PI/20);
                ctx.lineTo(cx + Math.cos(midAngle) * (outerTriple - 8), cy + Math.sin(midAngle) * (outerTriple - 8));
                ctx.fill();
                
                // Wire for triple
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, tripleRing, midAngle - Math.PI/20, midAngle + Math.PI/20);
                ctx.stroke();
                
                // Draw number
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const numX = cx + Math.cos(midAngle) * (outerRadius + 18);
                const numY = cy + Math.sin(midAngle) * (outerRadius + 18);
                ctx.fillText(numbers[i].toString(), numX, numY);
            }
            
            // Outer bull (green)
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.arc(cx, cy, outerBull, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Inner bull (red)
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.arc(cx, cy, innerBull, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Outer wire
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(cx, cy, outerRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Wire lines
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            for (let i = 0; i < 20; i++) {
                const angle = getNumberAngle(i);
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * innerBull, cy + Math.sin(angle) * innerBull);
                ctx.lineTo(cx + Math.cos(angle) * outerRadius, cy + Math.sin(angle) * outerRadius);
                ctx.stroke();
            }
        }
        
        function drawThrownDart(d) {
            ctx.save();
            ctx.translate(d.x, d.y);
            ctx.rotate(d.angle);
            
            // Shaft
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(-2, -25, 4, 25);
            
            // Point
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.moveTo(0, 5);
            ctx.lineTo(-3, 18);
            ctx.lineTo(3, 18);
            ctx.closePath();
            ctx.fill();
            
            // Flight
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.moveTo(-2, -23);
            ctx.lineTo(-14, -32);
            ctx.lineTo(-2, -28);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(2, -23);
            ctx.lineTo(14, -32);
            ctx.lineTo(2, -28);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawAimDart() {
            const { dart, power, wind } = gameState;
            ctx.save();
            ctx.translate(dart.x, dart.y);
            ctx.rotate(dart.angle);
            
            // Dart body
            ctx.fillStyle = '#888';
            ctx.fillRect(-2, -25, 4, 20);
            
            // Flight
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.moveTo(-2, -23);
            ctx.lineTo(-10, -30);
            ctx.lineTo(-2, -26);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(2, -23);
            ctx.lineTo(10, -30);
            ctx.lineTo(2, -26);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
            
            // Aim line (dashed)
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(dart.x, dart.y);
            ctx.lineTo(dart.x, dart.y - 300);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function draw() {
            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Wall
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(30, 30, 390, 390);
            
            // Board shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.arc(228, 223, dartboard.outerRadius + 10, 0, Math.PI * 2);
            ctx.fill();
            
            drawDartboard();
            
            // Throwing dart
            if (gameState.throwing) {
                drawThrownDart(gameState.dart);
            }
            
            // Aim dart (when not throwing)
            if (!gameState.throwing && !gameState.gameOver) {
                drawAimDart();
            }
            
            // Landed darts
            gameState.landedDarts.forEach(d => drawThrownDart(d));
            
            // Show score popup
            gameState.hitScores && gameState.hitScores.forEach((hs, i) => {
                ctx.fillStyle = hs.color;
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.globalAlpha = hs.alpha;
                ctx.fillText(hs.text, hs.x, hs.y);
                ctx.globalAlpha = 1;
            });
        }
        
        function calculateScore(x, y) {
            const { cx, cy, outerRadius, doubleRing, tripleRing, innerBull, outerBull, numbers, getNumberAngle } = dartboard;
            
            const dx = x - cx;
            const dy = y - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            // Outside board
            if (dist > outerRadius) return 0;
            
            // Bullseye!
            if (dist <= innerBull) return 50; // Bullseye
            
            // Outer bull
            if (dist <= outerBull) return 25;
            
            // Calculate which number
            let angle = Math.atan2(dy, dx) + Math.PI/2; // Adjust so 0 is at top
            if (angle < 0) angle += Math.PI * 2;
            
            // Find the segment (0-19 for numbers 20-5)
            let segment = Math.floor((angle + Math.PI/20) / (Math.PI * 2) * 20);
            segment = segment % 20;
            
            const number = numbers[segment];
            
            // Determine if double or triple
            let multiplier = 1;
            if (dist > tripleRing - 5 && dist < tripleRing + 5) {
                multiplier = 3; // Triple
            } else if (dist > doubleRing - 5 && dist < doubleRing + 5) {
                multiplier = 2; // Double
            }
            
            // Calculate base score
            let score = number * multiplier;
            
            // Missed the board wires
            if (dist > innerBull && dist < innerBull + 5) {
                // Near wire, could bounce out
                if (Math.random() < 0.3) score = 0;
            }
            
            return score;
        }
        
        function showHitScore(text, color, x, y) {
            if (!gameState.hitScores) gameState.hitScores = [];
            gameState.hitScores.push({ text, color, x, y, alpha: 1, vy: -2 });
        }
        
        function update() {
            const { dart, throwing, power, wind } = gameState;
            
            if (throwing) {
                // Apply wind
                dart.vx += wind * 0.02;
                
                dart.x += dart.vx;
                dart.y += dart.vy;
                dart.vy += 0.4; // Gravity
                dart.angle = Math.atan2(dart.vy, dart.vx);
                
                // Check hit on board
                const dx = dart.x - dartboard.cx;
                const dy = dart.y - dartboard.cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < dartboard.outerRadius && dart.y < dartboard.cy + dartboard.outerRadius) {
                    // Landed!
                    const score = calculateScore(dart.x, dart.y);
                    gameState.landedDarts.push({...dart});
                    
                    playSound('hit');
                    
                    if (score === 50) {
                        playSound('bullseye');
                        showHitScore('BULLSEYE!', '#e74c3c', dart.x, dart.y);
                    } else if (score === 25) {
                        showHitScore('BULL!', '#27ae60', dart.x, dart.y);
                    } else if (score > 0) {
                        showHitScore('+' + score, '#f1c40f', dart.x, dart.y);
                    } else {
                        showHitScore('MISS!', '#888', dart.x, dart.y);
                    }
                    
                    // Check if bust
                    const newScore = gameState.score - score;
                    if (score > 0 && (newScore < 0 || newScore === 1)) {
                        // BUST! Score resets to previous round score
                        playSound('bust');
                        showHitScore('BUST!', '#e74c3c', 225, 400);
                        gameState.score = gameState.roundHistory.length > 0 ? 
                            gameState.roundHistory[gameState.roundHistory.length - 1].score : 301;
                        gameState.roundScore = 0;
                        gameState.dartsLeft = 0;
                    } else if (score > 0) {
                        gameState.score -= score;
                        gameState.roundScore += score;
                        if (score > gameState.bestHit) gameState.bestHit = score;
                    }
                    
                    if (score > 0) playSound(score >= 40 ? 'bullseye' : 'hit');
                    
                    gameState.throwing = false;
                    gameState.dartsLeft--;
                    
                    if (gameState.dartsLeft <= 0) {
                        endRound();
                    }
                    
                    updateUI();
                }
                
                // Hit floor or off screen
                if (dart.y > 530 || dart.x < 20 || dart.x > 430) {
                    gameState.throwing = false;
                    gameState.dartsLeft--;
                    showHitScore('MISS!', '#888', 225, 400);
                    playSound('throw');
                    
                    if (gameState.dartsLeft <= 0) {
                        endRound();
                    }
                    updateUI();
                }
            }
            
            // Update hit score animations
            if (gameState.hitScores) {
                gameState.hitScores.forEach(hs => {
                    hs.y += hs.vy;
                    hs.alpha -= 0.02;
                });
                gameState.hitScores = gameState.hitScores.filter(hs => hs.alpha > 0);
            }
            
            // Update power bar
            if (gameState.charging) {
                const elapsed = Date.now() - gameState.chargeStart;
                gameState.power = Math.min(100, elapsed / 15); // Max charge in 1.5s
                document.getElementById('powerFill').style.width = gameState.power + '%';
            }
        }
        
        function endRound() {
            // Add to history
            gameState.roundHistory.push({
                round: gameState.round,
                score: gameState.roundScore,
                remaining: gameState.score
            });
            
            updateRoundsList();
            
            // Check win
            if (gameState.score === 0) {
                gameState.gameOver = true;
                gameState.won = true;
                setTimeout(() => {
                    alert(`🏆 CONGRATULATIONS! 🏆\n\nYou won in ${gameState.round} rounds!\n\nClick OK to play again!`);
                    gameState.roundHistory = [];
                    init();
                }, 500);
                return;
            }
            
            // Next round
            setTimeout(() => {
                gameState.round++;
                gameState.dartsLeft = 3;
                gameState.roundScore = 0;
                gameState.bestHit = 0;
                gameState.landedDarts = [];
                gameState.wind = Math.floor(Math.random() * 5) - 2;
                updateWindDisplay();
                updateUI();
            }, 1500);
        }
        
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('round').textContent = gameState.round;
            document.getElementById('darts').textContent = gameState.dartsLeft;
            document.getElementById('roundScore').textContent = gameState.roundScore;
            document.getElementById('bestHit').textContent = gameState.bestHit > 0 ? gameState.bestHit : '-';
        }
        
        function updateRoundsList() {
            const list = document.getElementById('roundsList');
            list.innerHTML = gameState.roundHistory.map(r => 
                `<div class="round-item">
                    <span>Round ${r.round}</span>
                    <span>+${r.score}</span>
                </div>`
            ).join('');
            list.scrollTop = list.scrollHeight;
        }
        
        function throwDart() {
            const { power, dart } = gameState;
            const throwPower = power / 100;
            
            dart.vy = -(12 + throwPower * 8); // Upward velocity
            dart.vx = (Math.random() - 0.5) * 2; // Slight random
            dart.angle = Math.PI / 2; // Pointing up
            
            gameState.throwing = true;
            gameState.power = 0;
            document.getElementById('powerFill').style.width = '0%';
            
            playSound('throw');
        }
        
        canvas.addEventListener('mousedown', (e) => {
            if (gameState.throwing || gameState.gameOver || gameState.dartsLeft <= 0) return;
            gameState.charging = true;
            gameState.chargeStart = Date.now();
            gameState.power = 0;
            initAudio(); // Initialize audio on user interaction
        });
        
        canvas.addEventListener('mouseup', (e) => {
            if (!gameState.charging) return;
            gameState.charging = false;
            if (gameState.power > 10) {
                throwDart();
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (gameState.throwing || gameState.gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            gameState.dart.x = Math.max(50, Math.min(400, x));
            gameState.dart.y = Math.max(100, Math.min(520, y));
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState.throwing || gameState.gameOver || gameState.dartsLeft <= 0) return;
            gameState.charging = true;
            gameState.chargeStart = Date.now();
            gameState.power = 0;
            initAudio();
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameState.throwing || gameState.gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            gameState.dart.x = Math.max(50, Math.min(400, x));
            gameState.dart.y = Math.max(100, Math.min(520, y));
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!gameState.charging) return;
            gameState.charging = false;
            if (gameState.power > 10) {
                throwDart();
            }
        });
        
        init();
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
