<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExploreCraft - Cool Games</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;touch-action:none}
        body{overflow:hidden;font-family:Arial,sans-serif;background:#000}
        canvas{display:block;width:100vw;height:100vh}
        #hud{position:fixed;top:10px;left:10px;color:#fff;font-size:14px;text-shadow:2px 2px 4px #000;z-index:100;background:rgba(0,0,0,0.5);padding:10px;border-radius:8px;pointer-events:none}
        #hotbar{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(0,0,0,0.8);padding:8px;border-radius:8px;border:2px solid #555;z-index:100}
        .slot{width:44px;height:44px;background:rgba(60,60,60,0.9);border:2px solid #444;border-radius:4px;display:flex;justify-content:center;align-items:center;font-size:22px;cursor:pointer}
        .slot.sel{border-color:#fff;background:rgba(100,100,100,0.95);transform:scale(1.1)}
        #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;z-index:100;pointer-events:none}
        #crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff}
        #crosshair::before{width:2px;height:20px;left:9px;top:0}
        #crosshair::after{width:20px;height:2px;top:9px;left:0}
        #start{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;text-align:center;padding:20px}
        #start h1{font-size:2.8rem;margin-bottom:10px;text-shadow:0 0 25px #667eea}
        #start h2{font-size:1.2rem;margin-bottom:25px;color:#ffd700}
        #start .ctrl{background:rgba(255,255,255,0.1);padding:20px;border-radius:12px;margin-bottom:20px}
        #start .ctrl p{margin:8px 0;font-size:14px}
        #start .ctrl .k{background:#333;padding:3px 10px;border-radius:4px;border:1px solid #555}
        #start .tip{background:rgba(0,255,255,0.15);padding:12px 20px;border-radius:10px;margin-bottom:20px;border:1px solid #0ff;font-size:14px}
        #start button{padding:15px 50px;font-size:20px;background:linear-gradient(135deg,#0ff,#099);border:none;color:#000;font-weight:bold;border-radius:25px;cursor:pointer;box-shadow:0 4px 20px rgba(0,255,255,0.4)}
        #dayNight{position:fixed;top:10px;right:10px;font-size:35px;z-index:100;pointer-events:none}
        #depth{position:fixed;top:60px;right:10px;color:#fff;font-size:14px;text-shadow:1px 1px 2px #000;z-index:100;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:6px;pointer-events:none}
        #inv{position:fixed;top:10px;right:10px;color:#fff;font-size:12px;z-index:100;background:rgba(0,0,0,0.6);padding:10px;border-radius:8px;min-width:110px;pointer-events:none}
        #inv h3{font-size:13px;color:#ffd700;margin-bottom:6px}
        #inv .row{display:flex;align-items:center;gap:8px;margin:4px 0}
        #inv .emj{font-size:16px}
        #inv .val{margin-left:auto;font-weight:bold}
        #found{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:26px;color:#ffd700;text-shadow:0 0 20px #ffd700;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
        #found.show{opacity:1}
        #mobile{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:none;z-index:100;gap:10px}
        #mobile button{width:60px;height:60px;background:rgba(255,255,255,0.3);border-radius:50%;border:2px solid #fff;font-size:24px;color:#fff}
    </style>
</head>
<body>
    <div id="start">
        <h1>⛏️ ExploreCraft</h1>
        <h2>💎 Mine for Rare Ores! 💎</h2>
        <div class="ctrl">
            <p><span class="k">W A S D</span> = Move</p>
            <p><span class="k">Mouse</span> = Look around</p>
            <p><span class="k">Space</span> = Jump</p>
            <p><span class="k">Left Click</span> = Mine</p>
            <p><span class="k">Right Click</span> = Place</p>
            <p><span class="k">1-9</span> = Select block</p>
        </div>
        <div class="tip">💎 Diamonds are deepest! Keep digging!</div>
        <button onclick="startGame()">🎮 START!</button>
    </div>

    <canvas id="c"></canvas>
    <div id="hud"><div id="time">☀️ Day 1</div></div>
    <div id="dayNight">☀️</div>
    <div id="depth">Surface</div>
    <div id="inv"><h3>💎 Ores</h3><div class="row"><span class="emj">ite</span><span>Coal</span><span class="val" id="coalC">0</span></div><div class="row"><span class="emj">🟫</span><span>Iron</span><span class="val" id="ironC">0</span></div><div class="row"><span class="emj">🟨</span><span>Gold</span><span class="val" id="goldC">0</span></div><div class="row"><span class="emj">💎</span><span>Diamond</span><span class="val" id="diamondC">0</span></div></div>
    <div id="found"></div>
    <div id="hotbar"></div>
    <div id="crosshair"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    const BLOCKS=[
        {id:1,name:'Grass',c:0x5d8c3e},{id:2,name:'Dirt',c:0x8b6914},{id:3,name:'Stone',c:0x707070},
        {id:4,name:'Cobble',c:0x606060},{id:5,name:'Wood',c:0x8b4513},{id:6,name:'Leaves',c:0x2e8b2e,a:true},
        {id:7,name:'Sand',c:0xf4d03f},{id:8,name:'Water',c:0x2980b9,a:true},
        {id:9,name:'Coal',c:0x1a1a1a,shine:true},{id:10,name:'Iron',c:0xc9a66b,shine:true},
        {id:11,name:'Gold',c:0xffd700,shine:true},{id:12,name:'Diamond',c:0x00ffff,shine:true}
    ];
    const DAY=15*60000;
    const GEO=new THREE.BoxGeometry(1,1,1);

    let scene,cam,rend;
    let player={x:50,y:30,z:50,vy:0,onGround:false,yaw:0,pitch:0,collected:{coal:0,iron:0,gold:0,diamond:0}};
    let blocks=new Map(),gen=new Set(),meshes=[],selectedSlot=0,gameOn=false,started=false;
    let keys={},time=0,day=1,night=false;
    let lastCX=-999,lastCZ=-999,sky,sunLight;

    function rand(s){let x=Math.sin(s)*1e5;return x-Math.floor(x);}
    function noise2D(x,y){let ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,a=rand(ix+iy*57),b=rand(ix+1+iy*57),c=rand(ix+(iy+1)*57),d=rand(ix+1+(iy+1)*57),ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return a+(b-a)*ux+(c-a)*uy+(a-b-c+d)*ux*uy;}
    function noise3D(x,y,z){return rand(Math.floor(x)+Math.floor(y)*57+Math.floor(z)*131);}

    function init(){
        scene=new THREE.Scene();
        scene.background=new THREE.Color(0x87ceeb);
        scene.fog=new THREE.Fog(0x87ceeb,30,120);
        cam=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,500);
        cam.position.set(50,40,50);
        rend=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
        rend.setSize(innerWidth,innerHeight);
        scene.add(new THREE.AmbientLight(0xffffff,0.5));
        sunLight=new THREE.DirectionalLight(0xffffff,0.8);
        sunLight.position.set(100,150,100);
        scene.add(sunLight);
        setupSky();
        setupHotbar();
        addEventListener('resize',onResize);
        addEventListener('keydown',e=>{keys[e.code]=true;if(e.code>='Digit1'&&e.code<='Digit9'){selectedSlot=parseInt(e.code.slice(5))-1;updateHotbar();}});
        addEventListener('keyup',e=>keys[e.code]=false);
        addEventListener('click',onClick);
        addEventListener('contextmenu',e=>{e.preventDefault();onPlace();});
        addEventListener('mousemove',onMouseMove);
        addEventListener('pointerlockchange',()=>{});
        loop();
    }

    function setupSky(){
        let geo=new THREE.SphereGeometry(350,32,32);
        let mat=new THREE.ShaderMaterial({
            uniforms:{top:{value:new THREE.Color(0x0077ff)},bottom:{value:new THREE.Color(0x87ceeb)}},
            vertexShader:`varying vec3 v;void main(){v=(modelMatrix*vec4(pos,1)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1);}`,
            fragmentShader:`uniform vec3 top,bottom;varying vec3 v;void main(){float h=normalize(v).y;gl_FragColor=vec4(mix(bottom,top,max(h,0.)),1.);}`,
            side:THREE.BackSide
        });
        sky=new THREE.Mesh(geo,mat);
        scene.add(sky);
    }

    function setB(x,y,z,t){blocks.set(`${x},${y},${z}`,t);}
    function getB(x,y,z){return blocks.get(`${x},${y},${z}`);}
    function solid(b){return b&&b!==8;}

    function genChunk(cx,cz){
        let CS=32;
        for(let x=0;x<CS;x++) for(let z=0;z<CS;z++){
            let wx=cx*CS+x,wz=cz*CS+z;
            let h=Math.floor(noise2D(wx*.015,wz*.015)*22+noise2D(wx*.05,wz*.05)*8+20);
            for(let y=0;y<=h;y++){
                if(y===h) setB(wx,y,wz,1);
                else if(y>h-4) setB(wx,y,wz,2);
                else{
                    let n=noise3D(wx*.08,y*.1,wz*.08);
                    if(y<h-10&&n>.7){
                        let d=h-y;
                        if(d>38) setB(wx,y,wz,12);
                        else if(d>28) setB(wx,y,wz,11);
                        else if(d>16) setB(wx,y,wz,10);
                        else setB(wx,y,wz,9);
                    } else setB(wx,y,wz,3);
                }
            }
            if(h<13) for(let y=9;y<h;y++) setB(wx,y,wz,8);
            if(h<15&&h>10) for(let y=h-2;y<h;y++) if(getB(wx,y,wz)===2) setB(wx,y,wz,7);
            if(noise2D(wx*.35,wz*.35)>.52&&h>17){
                let th=5+Math.floor(rand(wx*100+wz)*3);
                for(let t=1;t<th;t++) setB(wx,h+t,wz,5);
                for(let lx=-2;lx<=2;lx++) for(let lz=-2;lz<=2;lz++) for(let ly=0;ly<3;ly++)
                    if(Math.abs(lx)+Math.abs(lz)+Math.abs(ly)<5) setB(wx+lx,h+th+ly,wz+lz,6);
            }
            for(let y=3;y<h-7;y++){
                if(noise3D(wx*.06,y*.08,wz*.06)>.63){
                    let ch=2+Math.floor(rand(wx*30+y*20+wz)*3);
                    for(let cy=0;cy<ch;cy++) if(y+cy<h-4) setB(wx,y+cy,wz,0);
                }
            }
        }
    }

    function ensureChunk(cx,cz){
        let k=`${cx},${cz}`;
        if(!gen.has(k)){gen.add(k);genChunk(cx,cz);}
    }

    function ensureArea(){
        let cx=Math.floor(player.x/32),cz=Math.floor(player.z/32);
        if(cx!==lastCX||cz!==lastCZ){
            lastCX=cx;lastCZ=cz;
            for(let dx=-3;dx<=3;dx++) for(let dz=-3;dz<=3;dz++) ensureChunk(cx+dx,cz+dz);
            rebuild();
        }
    }

    function spawn(){
        ensureArea();
        let sx=50,sz=50;
        for(let y=60;y>0;y--){if(solid(getB(sx,y,sz))){player.y=y+2.5;break;}}
        player.x=sx;player.z=sz;
    }

    function rebuild(){
        meshes.forEach(m=>scene.remove(m));meshes=[];
        let px=Math.floor(player.x),pz=Math.floor(player.z);
        for(let x=px-45;x<px+45;x++) for(let y=0;y<70;y++) for(let z=pz-45;z<pz+45;z++){
            let t=getB(x,y,z);
            if(t&&t!==8&&t!==0){
                let b=BLOCKS[t-1];
                if(b){
                    let mat=new THREE.MeshLambertMaterial({color:b.c,transparent:b.a||false,opacity:b.a?.5:1,emissive:b.shine?b.c:0x000000,emissiveIntensity:b.shine?.15:0});
                    let m=new THREE.Mesh(GEO,mat);
                    m.position.set(x+.5,y+.5,z+.5);
                    scene.add(m);meshes.push(m);
                }
            }
        }
    }

    function setupHotbar(){
        let h=document.getElementById('hotbar');
        h.innerHTML='';
        BLOCKS.slice(0,9).forEach((b,i)=>{
            let s=document.createElement('div');
            s.className='slot'+(i===selectedSlot?' sel':'');
            s.textContent=['🟩','🟫','⬜','🪨','🟫','🌿','🟨','💧','ite'][i];
            s.onclick=()=>{selectedSlot=i;updateHotbar();};
            h.appendChild(s);
        });
    }
    function updateHotbar(){document.querySelectorAll('.slot').forEach((s,i)=>s.classList.toggle('sel',i===selectedSlot));}

    function onResize(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();rend.setSize(innerWidth,innerHeight);}

    function onMouseMove(e){
        if(!gameOn||!document.pointerLockElement)return;
        player.yaw-=e.movementX*.002;
        player.pitch-=e.movementY*.002;
        player.pitch=Math.max(-Math.PI/2+0.1,Math.min(Math.PI/2-0.1,player.pitch));
    }

    function updateCam(){
        cam.position.set(player.x,player.y+1.6,player.z);
        cam.rotation.order='YXZ';
        cam.rotation.y=player.yaw;
        cam.rotation.x=player.pitch;
    }

    function updatePlayer(){
        if(!gameOn)return;
        let fwd=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
        fwd.y=0;fwd.normalize();
        let right=new THREE.Vector3(1,0,0).applyQuaternion(cam.quaternion);
        right.y=0;right.normalize();
        let mx=0,mz=0;
        if(keys['KeyW']||keys['ArrowUp'])mz+=1;
        if(keys['KeyS']||keys['ArrowDown'])mz-=1;
        if(keys['KeyA']||keys['ArrowLeft'])mx-=1;
        if(keys['KeyD']||keys['ArrowRight'])mx+=1;
        if(mx||mz){
            let sp=new THREE.Vector3(mx,0,mz).normalize();
            let move=fwd.multiplyScalar(sp.z).add(right.multiplyScalar(sp.x));
            player.x+=move.x*.15;
            player.z+=move.z*.15;
        }
        if((keys['Space'])&&player.onGround){player.vy=.22;player.onGround=false;}
        player.vy-=.015;player.y+=player.vy;
        let gy=getGround(player.x,player.z);
        if(player.y<=gy+1.6){player.y=gy+1.6;player.vy=0;player.onGround=true;}
        if(player.y<-30){player.y=60;player.vy=0;player.onGround=false;}
        ensureArea();
        updateCam();
        let depth=Math.max(0,Math.floor(50-player.y));
        document.getElementById('depth').textContent=depth<2?'⛏️ Surface':'⛏️ Depth: '+depth;
    }

    function getGround(x,z){
        for(let y=69;y>=0;y--){let b=getB(Math.floor(x),y,Math.floor(z));if(solid(b))return y+1;}
        return 0;
    }

    function updateDay(){
        if(!gameOn)return;
        time+=16;
        let cyc=DAY*2,pos=(time%cyc)/cyc;
        night=pos>.5;
        let dp=night?(pos-.5)*2:pos*2;
        let topC=night?0x001133:0x0077ff;
        let botC=night?0x000511:0x87ceeb;
        if(sky) sky.material.uniforms.top.value.setHex(topC);
        if(sky) sky.material.uniforms.bottom.value.setHex(botC);
        if(sunLight){sunLight.position.y=Math.cos(dp*Math.PI*2)*150;sunLight.intensity=night?.2:.8;}
        scene.fog.color.setHex(night?0x001133:0x87ceeb);
        scene.background.setHex(night?0x000511:0x87ceeb);
        document.getElementById('dayNight').textContent=night?'🌙':'☀️';
        day=Math.floor(time/cyc)+1;
        document.getElementById('time').textContent=(night?'🌙 ':'☀️ ')+`Day ${day}`;
    }

    function showFound(emj){
        let el=document.getElementById('found');
        el.textContent=emj+' Found! '+emj;
        el.classList.add('show');
        setTimeout(()=>el.classList.remove('show'),1500);
    }

    function onClick(){
        if(!gameOn)return;
        if(!document.pointerLockElement){document.body.requestPointerLock();return;}
        let dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
        let mx=Math.floor(player.x+dir.x*3),my=Math.floor(player.y+dir.y*3+1),mz=Math.floor(player.z+dir.z*3);
        for(let dy=2;dy>=-3;dy--) for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++){
            let b=getB(mx+dx,my+dy,mz+dz);
            if(b&&b!==8&&b!==0){
                let info=BLOCKS[b-1];
                if(info){
                    let nm=info.name.toLowerCase();
                    if(nm==='coal'||nm==='iron'||nm==='gold'||nm==='diamond'){
                        player.collected[nm]++;
                        document.getElementById(nm+'C').textContent=player.collected[nm];
                        showFound(info.id===12?'💎':info.id===11?'🟨':info.id===10?'🟫':'ite');
                    }
                }
                blocks.delete(`${mx+dx},${my+dy},${mz+dz}`);
                rebuild();return;
            }
        }
    }

    function onPlace(){
        if(!gameOn)return;
        let dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
        let mx=Math.floor(player.x+dir.x*3),my=Math.floor(player.y+dir.y*3+1),mz=Math.floor(player.z+dir.z*3);
        let bl=BLOCKS[selectedSlot];
        for(let dy=3;dy>=-2;dy--) for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++){
            if(!getB(mx+dx,my+dy,mz+dz)){setB(mx+dx,my+dy,mz+dz,bl.id);rebuild();return;}
        }
    }

    function startGame(){
        if(started)return;
        started=true;gameOn=true;
        document.getElementById('start').style.display='none';
        spawn();
        ensureArea();
        rebuild();
        updateCam();
        document.body.requestPointerLock();
    }

    function loop(){
        requestAnimationFrame(()=>{updateDay();updatePlayer();rend.render(scene,cam);loop();});
    }

    init();
    </script>
</body>
</html>
